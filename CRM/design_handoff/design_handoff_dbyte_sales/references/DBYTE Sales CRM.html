<script src="https://unpkg.com/lucide@0.454.0/dist/umd/lucide.js"></script>
<script>
  // Expose a createIcon helper so we can use lucide in React w/o lucide-react
  // Convert kebab-case → PascalCase for lucide lookup
  function toPascal(name) {
    return name.split('-').map(s => s ? s[0].toUpperCase() + s.slice(1) : '').join('');
  }
  window.LucideIcon = function LucideIcon({ name, size = 18, strokeWidth = 2, className = '', style = {} }) {
    const ref = React.useRef(null);
    React.useEffect(() => {
      if (!ref.current || !window.lucide || !window.lucide.icons) return;
      const key = toPascal(name);
      const iconDef = window.lucide.icons[key] || window.lucide.icons[name];
      if (!iconDef) return;
      const svg = window.lucide.createElement(iconDef, { 'stroke-width': strokeWidth });
      if (svg) {
        svg.setAttribute('width', size);
        svg.setAttribute('height', size);
        ref.current.innerHTML = '';
        ref.current.appendChild(svg);
      }
    }, [name, size, strokeWidth]);
    return React.createElement('span', {
      ref,
      className,
      style: { display: 'inline-flex', alignItems: 'center', justifyContent: 'center', ...style }
    });
  };
</script>
