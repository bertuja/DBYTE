map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name metabase.webpack.com.ar;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name metabase.webpack.com.ar;

    ssl_certificate /etc/letsencrypt/live/metabase.webpack.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/metabase.webpack.com.ar/privkey.pem;

    gzip on;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml+rss text/javascript;

    access_log /var/log/nginx/access.log;

    location / {
        proxy_pass http://metabase:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 1200s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 3600s;
        uwsgi_read_timeout 3600s;
    }
}
